{% set name = "uncalled-for" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: b4f8fdbcec328c5a113807d653e041c5094473dd4afa7c34599ace69ccb7e69f

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python

test:
  requires:
    - pip
  commands:
    - pip check
  imports:
    - uncalled_for

about:
  home: https://github.com/chrisguidry/uncalled-for
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Async dependency injection for Python functions
  description: |
    A small, focused dependency injection toolkit for async Python functions,
    extracted from the common bits of Docket and FastMCP.
  dev_url: https://github.com/chrisguidry/uncalled-for
  doc_url: https://github.com/chrisguidry/uncalled-for

extra:
  recipe-maintainers:
    - chrisguidry
    - zzstoatzz
